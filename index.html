<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Đăng Ký Giải Chạy Lễ Hội</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d32f2f; /* Màu đỏ lễ hội */
            --secondary-color: #1a237e; /* Màu xanh Thượng Cát Runners */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .update-time { color: #666; font-style: italic; }
        
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: var(--secondary-color);
            color: white;
            text-align: left;
            padding: 12px 15px;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f1f1; transition: 0.3s; }

        .loading {
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Responsive cho điện thoại */
        @media (max-width: 600px) {
            .container { padding: 15px; }
            .header h1 { font-size: 18px; }
            th, td { padding: 8px 10px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Danh Sách Đăng Ký Giải Chạy Lễ Hội</h1>
        <p style="margin-top: 5px; font-weight: 600;">Thượng Cát Runners phối hợp cùng BTC Lễ Hội</p>
    </div>

    <div class="status-bar">
        <div id="count" style="font-weight: bold; color: var(--secondary-color);">Đang tải dữ liệu...</div>
        <div class="update-time" id="update-time"></div>
    </div>

    <div class="table-wrapper">
        <table id="runner-table">
            <thead>
                <tr id="table-header">
                    </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="10" class="loading">Đang cập nhật danh sách mới nhất...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Link đã được chuyển sang định dạng CSV để code đọc được
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKUIOMpx6TaSgNcWiKma6qtf_Yf0_tbpgvdIIzDeLAw76ZFVIbACfih90OoDF78WiXf_d9esRdY06J/pub?gid=1353301806&single=true&output=tsv';

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split('\n').map(row => row.split(','));
            
            if (rows.length > 0) {
                renderTable(rows);
            }
        } catch (error) {
            console.error('Lỗi:', error);
            document.getElementById('table-body').innerHTML = '<tr><td colspan="10">Không thể tải dữ liệu. Vui lòng kiểm tra kết nối.</td></tr>';
        }
    }

    function renderTable(rows) {
        const header = rows[0];
        const body = rows.slice(1);
        
        // Vẽ tiêu đề
        const headerHtml = header.map(h => `<th>${h.trim()}</th>`).join('');
        document.getElementById('table-header').innerHTML = headerHtml;

        // Vẽ nội dung
        const bodyHtml = body.map(row => {
            if (row.length === header.length) {
                return `<tr>${row.map(cell => `<td>${cell.trim()}</td>`).join('')}</tr>`;
            }
            return '';
        }).join('');

        document.getElementById('table-body').innerHTML = bodyHtml;
        document.getElementById('count').innerText = `Tổng số: ${body.length} vận động viên`;
        document.getElementById('update-time').innerText = `Cập nhật lúc: ${new Date().toLocaleTimeString()}`;
    }

    // Tự động tải lại sau mỗi 2 phút
    fetchData();
    setInterval(fetchData, 120000);
</script>

</body>
</html>
