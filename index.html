<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Đăng Ký Giải Chạy Lễ Hội</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d32f2f; /* Màu đỏ lễ hội */
            --secondary-color: #1a237e; /* Màu xanh Thượng Cát Runners */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.95em;
            padding: 0 5px;
        }

        .update-time { color: #666; font-style: italic; }
        
        .table-wrapper {
            overflow-x: auto;
            max-height: none; 
            border: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }

        th {
            background-color: var(--secondary-color);
            color: white;
            text-align: left;
            padding: 15px;
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f1f1; transition: 0.2s; }

        .loading {
            text-align: center;
            padding: 40px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 18px;
        }

        @media (max-width: 600px) {
            .container { padding: 10px; border-radius: 0; }
            .header h1 { font-size: 18px; }
            th, td { padding: 8px; font-size: 12px; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Danh Sách Đăng Ký Giải Chạy Lễ Hội</h1>
        <p style="margin-top: 8px; font-weight: 600; color: #555;">Thượng Cát Runners phối hợp cùng BTC Lễ Hội</p>
    </div>

    <div class="status-bar">
        <div id="count" style="font-weight: bold; color: var(--secondary-color);">Đang kết nối dữ liệu...</div>
        <div class="update-time" id="update-time"></div>
    </div>

    <div class="table-wrapper">
        <table id="runner-table">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Họ và Tên</th>
                    <th>Ngày sinh</th>
                    <th>Giới tính</th>
                    <th>Câu lạc bộ</th>
                    <th>Cự ly</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="6" class="loading">Đang cập nhật danh sách vận động viên...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQKUIOMpx6TaSgNcWiKma6qtf_Yf0_tbpgvdIIzDeLAw76ZFVIbACfih90OoDF78WiXf_d9esRdY06J/pub?gid=1353301806&single=true&output=csv';

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            const rows = data.split('\n').map(row => {
                const re = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                return row.split(re).map(cell => cell.replace(/^"|"$/g, '').trim());
            });
            
            if (rows.length > 0) {
                renderTable(rows);
            }
        } catch (error) {
            console.error('Lỗi kết nối:', error);
            document.getElementById('table-body').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">Không thể tải dữ liệu. Anh vui lòng kiểm tra lại link CSV.</td></tr>';
        }
    }

    function renderTable(rows) {
        const header = rows[0];
        const body = rows.slice(1);
        
        // Xác định vị trí cột dựa trên tiêu đề trong Google Sheets của anh
        // Em lọc theo từ khóa để tự động tìm đúng cột dù anh có chèn thêm cột khác
        const idxName = header.findIndex(h => h.includes("Họ và tên"));
        const idxGender = header.findIndex(h => h.includes("Giới tính"));
        const idxDay = header.findIndex(h => h.includes("Ngày"));
        const idxMonth = header.findIndex(h => h.includes("tháng"));
        const idxYear = header.findIndex(h => h.includes("năm sinh"));
        const idxClub = header.findIndex(h => h.includes("Câu lạc bộ"));
        const idxDistance = header.findIndex(h => h.includes("Cự ly"));

        let bodyHtml = '';
        let count = 0;

        body.forEach((row) => {
            if (row.length >= header.length && row[idxName]) {
                count++;
                // Ghép Ngày - Tháng - Năm sinh lại cho gọn
                const birthDate = `${row[idxDay]}/${row[idxMonth]}/${row[idxYear]}`;
                
                bodyHtml += `<tr>
                    <td>${count}</td>
                    <td style="font-weight:600;">${row[idxName]}</td>
                    <td>${birthDate}</td>
                    <td>${row[idxGender]}</td>
                    <td>${row[idxClub] || 'Cá nhân'}</td>
                    <td style="font-weight:700; color:var(--primary-color);">${row[idxDistance]}</td>
                </tr>`;
            }
        });

        document.getElementById('table-body').innerHTML = bodyHtml;
        document.getElementById('count').innerText = `Tổng số: ${count} vận động viên`;
        document.getElementById('update-time').innerText = `Cập nhật: ${new Date().toLocaleTimeString()}`;
    }

    fetchData();
    setInterval(fetchData, 60000); // Cập nhật sau mỗi 60 giây
</script>

</body>
</html>
