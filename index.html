<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Các style cũ được giữ nguyên tuyệt đối */
        .group-container {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        /* Chỉnh sửa phần nhóm thi đấu: Căn giữa và tô màu nền nổi bật */
        .nhom-thi-dau {
            text-align: center; /* Căn giữa chữ trong ô */
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            color: #ffffff; /* Màu chữ trắng để nổi bật trên nền màu */
        }

        /* Màu nền riêng biệt cho 3 nhóm để gây chú ý */
        .nhom-elite {
            background-color: #d32f2f; /* Đỏ đậm nổi bật */
            border: 2px solid #b71c1c;
        }

        .nhom-4km {
            background-color: #1976d2; /* Xanh dương đậm */
            border: 2px solid #0d47a1;
        }

        .nhom-2km {
            background-color: #388e3c; /* Xanh lá đậm */
            border: 2px solid #1b5e20;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }

        .item-list li {
            padding: 5px 0;
        }
    </style>
</head>
<body>

    <div class="group-container">
        <div class="nhom-thi-dau nhom-elite">NHÓM ELITE (4KM) (10 VĐV)</div>
        <ul class="item-list">
            <li>Vận động viên 1</li>
            <li>Vận động viên 2</li>
            <li>...</li>
        </ul>
    </div>

    <div class="group-container">
        <div class="nhom-thi-dau nhom-4km">NHÓM 4KM</div>
        <ul class="item-list">
            <li>Vận động viên 1</li>
            <li>Vận động viên 2</li>
            <li>...</li>
        </ul>
    </div>

    <div class="group-container">
        <div class="nhom-thi-dau nhom-2km">NHÓM 2KM</div>
        <ul class="item-list">
            <li>Vận động viên 1</li>
            <li>Vận động viên 2</li>
            <li>...</li>
        </ul>
    </div>

</body>
</html>
