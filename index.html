<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Đăng Ký Giải Chạy Lễ Hội</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d32f2f; 
            --secondary-color: #1a237e; 
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            margin-bottom: 25px;
            padding-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.95em;
            padding: 0 5px;
        }

        .update-time { color: #666; font-style: italic; }
        
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
            min-width: 600px;
        }

        th {
            background-color: var(--secondary-color);
            color: white;
            text-align: left;
            padding: 15px;
            font-weight: 600;
            white-space: nowrap;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f1f1; transition: 0.2s; }

        .loading {
            text-align: center;
            padding: 40px;
            font-weight: bold;
            color: var(--primary-color);
            font-size: 18px;
        }

        @media (max-width: 600px) {
            .container { padding: 10px; border-radius: 0; }
            .header h1 { font-size: 18px; }
            th, td { padding: 10px 8px; font-size: 12px; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Danh Sách Đăng Ký Giải Chạy Lễ Hội</h1>
        <p style="margin-top: 8px; font-weight: 600; color: #555;">Thượng Cát Runners phối hợp cùng BTC Lễ Hội</p>
    </div>

    <div class="status-bar">
        <div id="count" style="font-weight: bold; color: var(--secondary-color);">Đang kết nối dữ liệu...</div>
        <div class="update-time" id="update-time"></div>
    </div>

    <div class="table-wrapper">
        <table id="runner-table">
            <thead>
                <tr>
                    <th style="width: 50px;">STT</th>
                    <th>Họ và Tên</th>
                    <th>Ngày sinh</th>
                    <th>Giới tính</th>
                    <th>Câu lạc bộ</th>
                    <th>Cự ly</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr>
                    <td colspan="6" class="loading">Đang cập nhật danh sách vận động viên...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0T_icnHRGLNQ019mNGQWpYW561451GJz2zBWkAbEjp87bz8A_H7bf-CAosCsRaMSHD8-Hp5M7Y0Cu/pub?gid=1471720149&single=true&output=tsv';

    async function fetchData() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            
            // Xử lý dữ liệu CSV chuyên sâu hơn để tránh lỗi hiển thị lung tung
            const rows = parseCSV(text);
            
            if (rows.length > 0) {
                renderTable(rows);
            }
        } catch (error) {
            console.error('Lỗi:', error);
            document.getElementById('table-body').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">Không thể tải dữ liệu. Anh kiểm tra lại link nhé!</td></tr>';
        }
    }

    // Hàm bóc tách CSV chuyên dụng
    function parseCSV(str) {
        const arr = [];
        let quote = false;
        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || [];
            arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if (cc == '\n' && !quote) { ++row; col = 0; continue; }
            if (cc == '\r' && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    function renderTable(rows) {
        const header = rows[0].map(h => h.toLowerCase().trim());
        const body = rows.slice(1);
        
        // Tìm vị trí chính xác của từng cột dựa trên từ khóa
        const findIdx = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));

        const idxName = findIdx(['họ và tên', 'ho va ten', 'họ tên']);
        const idxGender = findIdx(['giới tính', 'gioi tinh']);
        const idxDay = findIdx(['ngày']);
        const idxMonth = findIdx(['tháng']);
        const idxYear = findIdx(['năm sinh', 'nam sinh']);
        const idxClub = findIdx(['câu lạc bộ', 'clb', 'don vi']);
        const idxDistance = findIdx(['cự ly', 'cu ly']);

        let bodyHtml = '';
        let count = 0;

        body.forEach((row) => {
            if (row[idxName] && row[idxName].trim() !== "") {
                count++;
                
                // Gộp ngày tháng năm sinh nếu có đủ thông tin
                const d = row[idxDay] || '';
                const m = row[idxMonth] || '';
                const y = row[idxYear] || '';
                const birthDate = (d || m || y) ? `${d}/${m}/${y}` : '---';
                
                // Câu lạc bộ
                const club = row[idxClub] ? row[idxClub].trim() : 'Cá nhân';
                
                bodyHtml += `<tr>
                    <td>${count}</td>
                    <td style="font-weight:600; color:var(--secondary-color);">${row[idxName].trim()}</td>
                    <td>${birthDate}</td>
                    <td>${row[idxGender] || '---'}</td>
                    <td>${club}</td>
                    <td style="font-weight:700; color:var(--primary-color);">${row[idxDistance] || '---'}</td>
                </tr>`;
            }
        });

        document.getElementById('table-body').innerHTML = bodyHtml;
        document.getElementById('count').innerText = `Tổng số: ${count} vận động viên`;
        document.getElementById('update-time').innerText = `Cập nhật: ${new Date().toLocaleTimeString()}`;
    }

    fetchData();
    setInterval(fetchData, 60000); 
</script>

</body>
</html>
