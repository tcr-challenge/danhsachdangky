<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bước chân Di Sản 2026 - TCR</title>
    <style>
        /* Toàn bộ CSS cũ của anh em giữ nguyên không đổi một chữ */
        :root { --primary-color: #d32f2f; --secondary-color: #1a237e; }
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .section-title { font-weight: bold; color: var(--secondary-color); text-transform: uppercase; margin: 20px 0; }
        /* ... Các style khác của trang Index ... */
        .content-section { min-height: 100px; }
    </style>
</head>
<body>

    <div class="section-container">
        <h2 class="section-title">THỂ LỆ GIẢI</h2>
        <div id="content-rules" class="content-section">
            <p style="text-align:center; color:#999;">Đang tải nội dung...</p>
        </div>
    </div>

    <div class="section-container">
        <h2 class="section-title">SƠ ĐỒ ĐƯỜNG CHẠY</h2>
        <div id="content-map" class="content-section">
            <p style="text-align:center; color:#999;">Đang tải nội dung...</p>
        </div>
    </div>

    <div class="section-container">
        <h2 class="section-title">HƯỚNG DẪN VẬN ĐỘNG VIÊN</h2>
        <div id="content-guide" class="content-section">
            <p style="text-align:center; color:#999;">Đang tải nội dung...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Cấu hình Firebase chính xác từ hình ảnh anh gửi
        const firebaseConfig = {
            apiKey: "AIzaSyCTs0StZhHXp4-M-gVhOWmlxsPeK6gx51Q",
            authDomain: "giaichay2026.firebaseapp.com",
            projectId: "giaichay2026",
            storageBucket: "giaichay2026.firebasestorage.app",
            messagingSenderId: "255568327540",
            appId: "1:255568327540:web:bb04e4ca37a921fd7e7221"
        };

        // Khởi tạo Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Lắng nghe dữ liệu thay đổi từ trang Admin
        db.ref('raceData').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // Tự động thay thế nội dung cũ bằng nội dung mới từ Admin
                if (data.rules) document.getElementById('content-rules').innerHTML = data.rules;
                if (data.map) document.getElementById('content-map').innerHTML = data.map;
                if (data.guide) document.getElementById('content-guide').innerHTML = data.guide;
            }
        });
    </script>
</body>
</html>
