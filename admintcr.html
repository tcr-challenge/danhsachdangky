<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bước chân Di Sản 2026</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --primary: #d32f2f; --secondary: #1a237e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--secondary); text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .section { margin-bottom: 40px; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .editor-container { height: 300px; }
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-delete { background: #e0e0e0; color: #333; }
        .btn-save:hover { background: #000; opacity: 0.9; }
        .btn-delete:hover { background: #ffcdd2; color: #d32f2f; }
        #toast { position: fixed; top: 20px; right: 20px; background: #2e7d32; color: white; padding: 15px 25px; border-radius: 5px; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="toast">✅ Đã cập nhật lên hệ thống!</div>

<div class="container">
    <h1>QUẢN TRỊ NỘI DUNG GIẢI CHẠY</h1>
    
    <div class="section">
        <div class="header-flex">
            <h3>1. THỂ LỆ GIẢI</h3>
            <div class="btn-group">
                <button class="btn btn-delete" onclick="deleteContent('rules')">XÓA TRỐNG</button>
                <button class="btn btn-save" onclick="uploadToFirebase('rules')">CẬP NHẬT WEB</button>
            </div>
        </div>
        <div id="edit-rules" class="editor-container"></div>
    </div>

    <div class="section">
        <div class="header-flex">
            <h3>2. SƠ ĐỒ ĐƯỜNG CHẠY</h3>
            <div class="btn-group">
                <button class="btn btn-delete" onclick="deleteContent('map')">XÓA TRỐNG</button>
                <button class="btn btn-save" onclick="uploadToFirebase('map')">CẬP NHẬT WEB</button>
            </div>
        </div>
        <div id="edit-map" class="editor-container"></div>
    </div>

    <div class="section">
        <div class="header-flex">
            <h3>3. HƯỚNG DẪN VẬN ĐỘNG VIÊN</h3>
            <div class="btn-group">
                <button class="btn btn-delete" onclick="deleteContent('guide')">XÓA TRỐNG</button>
                <button class="btn btn-save" onclick="uploadToFirebase('guide')">CẬP NHẬT WEB</button>
            </div>
        </div>
        <div id="edit-guide" class="editor-container"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    // Cấu hình Firebase của anh
    const firebaseConfig = {
        apiKey: "AIzaSyCTs0StZhHXp4-M-gVhOWmlxsPeK6gx51Q",
        authDomain: "giaichay2026.firebaseapp.com",
        projectId: "giaichay2026",
        storageBucket: "giaichay2026.firebasestorage.app",
        messagingSenderId: "255568327540",
        appId: "1:255568327540:web:bb04e4ca37a921fd7e7221"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Cấu hình Editor Quill
    const toolbar = [
        ['bold', 'italic', 'underline'],
        [{ 'header': [1, 2, 3, false] }],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        [{ 'align': [] }],
        ['link', 'image', 'video'],
        ['clean']
    ];

    const qRules = new Quill('#edit-rules', { modules: { toolbar }, theme: 'snow' });
    const qMap = new Quill('#edit-map', { modules: { toolbar }, theme: 'snow' });
    const qGuide = new Quill('#edit-guide', { modules: { toolbar }, theme: 'snow' });

    // Tải dữ liệu cũ từ Firebase về Editor
    db.ref('raceData').once('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            if(data.rules) qRules.clipboard.dangerouslyPasteHTML(data.rules);
            if(data.map) qMap.clipboard.dangerouslyPasteHTML(data.map);
            if(data.guide) qGuide.clipboard.dangerouslyPasteHTML(data.guide);
        }
    });

    // Hàm lưu dữ liệu
    function uploadToFirebase(type) {
        let content = "";
        if(type === 'rules') content = qRules.root.innerHTML;
        if(type === 'map') content = qMap.root.innerHTML;
        if(type === 'guide') content = qGuide.root.innerHTML;

        db.ref('raceData/' + type).set(content).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        });
    }

    // Hàm xóa dữ liệu
    function deleteContent(type) {
        if(confirm("Anh có chắc chắn muốn xóa sạch nội dung mục này không?")) {
            db.ref('raceData/' + type).remove().then(() => {
                alert("Đã xóa xong! ✅");
                location.reload();
            });
        }
    }
</script>

</body>
</html>
