<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Panel — Bước Chân Di Sản 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red:    #dc2626;
            --dark:   #0a0a0a;
            --card:   #141414;
            --border: #262626;
            --text:   #f5f5f5;
            --muted:  #737373;
            --green:  #16a34a;
            --yellow: #ca8a04;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--dark); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* HEADER */
        header {
            background: var(--card); border-bottom: 2px solid var(--red);
            padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--red); }
        .logo span { color: var(--text); }
        .header-badge {
            background: var(--border); border-radius: 6px; padding: 4px 12px;
            font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted);
            text-transform: uppercase;
        }

        /* MAIN LAYOUT */
        main { flex: 1; display: grid; grid-template-columns: 1fr 340px; gap: 0; }

        /* LEFT - INPUT PANEL */
        .input-panel {
            padding: 32px; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 24px;
        }

        .section-title {
            font-size: 11px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
        }

        /* BIB INPUT */
        .bib-wrapper { position: relative; }
        .bib-input {
            width: 100%; background: var(--card); border: 2px solid var(--border);
            border-radius: 12px; padding: 20px 24px; font-size: 56px;
            font-family: 'Bebas Neue', sans-serif; letter-spacing: 8px;
            color: var(--text); outline: none; text-align: center;
            transition: border-color 0.2s;
        }
        .bib-input:focus { border-color: var(--red); }
        .bib-input::placeholder { color: var(--border); }

        /* RESULT CARD */
        .result-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; display: none;
        }
        .result-card.show { display: block; }
        .result-card.success { border-color: var(--green); }
        .result-card.error   { border-color: var(--red); }

        .result-bib  { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--red); letter-spacing: 4px; }
        .result-name { font-size: 22px; font-weight: 700; margin: 4px 0; }
        .result-club { font-size: 14px; color: var(--muted); }
        .result-meta { display: flex; gap: 16px; margin-top: 12px; }
        .result-meta-item {
            background: var(--border); border-radius: 6px; padding: 6px 12px;
            font-size: 12px; font-weight: 600; color: var(--muted);
        }
        .result-meta-item span { color: var(--text); }

        /* BUTTONS */
        .btn-row { display: flex; gap: 12px; }
        .btn {
            flex: 1; padding: 16px; border-radius: 10px; border: none; cursor: pointer;
            font-family: 'IBM Plex Sans', sans-serif; font-weight: 700;
            font-size: 14px; letter-spacing: 1px; text-transform: uppercase;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--red); color: white; }
        .btn-primary:hover:not(:disabled) { background: #b91c1c; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-secondary:hover { background: #333; }
        .btn-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); flex: 0; padding: 16px 20px; }
        .btn-clear:hover { border-color: var(--red); color: var(--red); }

        /* NUMPAD */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .numpad-btn {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 18px; font-size: 24px; font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px; color: var(--text); cursor: pointer;
            transition: all 0.15s; text-align: center;
        }
        .numpad-btn:hover  { background: var(--border); border-color: var(--red); color: var(--red); }
        .numpad-btn:active { transform: scale(0.95); }
        .numpad-btn.del    { color: var(--red); font-size: 18px; }
        .numpad-btn.zero   { grid-column: span 2; }
        .numpad-btn.enter  {
            background: var(--red); color: white; border-color: var(--red);
            font-size: 16px;
        }
        .numpad-btn.enter:hover { background: #b91c1c; }

        /* STATUS BAR */
        .status-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; background: var(--card);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 13px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
            animation: pulse 2s infinite;
        }
        .status-dot.ok     { background: var(--green); }
        .status-dot.err    { background: var(--red); animation: none; }
        .status-dot.loading{ background: var(--yellow); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* RIGHT - HISTORY */
        .history-panel { padding: 24px; overflow-y: auto; }
        .history-item {
            padding: 12px; border-bottom: 1px solid var(--border);
            display: flex; gap: 12px; align-items: center;
            cursor: pointer; transition: background 0.15s; border-radius: 6px;
        }
        .history-item:hover { background: var(--card); }
        .history-bib {
            font-family: 'Bebas Neue', sans-serif; font-size: 28px;
            color: var(--red); letter-spacing: 2px; min-width: 70px;
        }
        .history-info { flex: 1; }
        .history-name { font-weight: 600; font-size: 13px; }
        .history-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .history-count {
            font-size: 11px; background: var(--border); padding: 2px 8px;
            border-radius: 4px; color: var(--muted); white-space: nowrap;
        }

        /* LOADING OVERLAY */
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(4px);
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner {
            width: 48px; height: 48px; border: 4px solid var(--border);
            border-top-color: var(--red); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TOAST */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--green); color: white; padding: 12px 24px; border-radius: 8px;
            font-weight: 700; font-size: 14px; transition: transform 0.3s;
            z-index: 200; white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--red); }

        /* CONFIG */
        .config-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px;
        }
        .config-input {
            width: 100%; background: var(--dark); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 12px; color: var(--text);
            font-size: 12px; font-family: monospace; outline: none;
        }
        .config-input:focus { border-color: var(--red); }
    </style>
</head>
<body>

<header>
    <div class="logo">BƯỚC CHÂN <span>DI SẢN</span> 2026</div>
    <div style="display:flex;gap:12px;align-items:center;">
        <div class="status-bar" style="padding:6px 12px;">
            <div class="status-dot ok" id="connDot"></div>
            <span id="connText" style="font-size:12px;">Đang kết nối...</span>
        </div>
        <div class="header-badge">SUPPORT PANEL</div>
    </div>
</header>

<main>
    <!-- LEFT: INPUT -->
    <div class="input-panel">

        <!-- CONFIG -->
        <div class="config-section">
            <div class="section-title">⚙️ Cấu hình GAS URL</div>
            <input type="text" class="config-input" id="gasUrl"
                placeholder="https://script.google.com/macros/s/AKfycbw4jCIsCWiE-pcQmVRwleb6XjZlP0ACVQYQeSSMBdv0D-CJ_guEC0vYVUDp300teRU9HA/exec"
                value="">
        </div>

        <!-- BIB INPUT -->
        <div>
            <div class="section-title">📋 Nhập số BIB</div>
            <div class="bib-wrapper">
                <input type="text" class="bib-input" id="bibInput"
                    placeholder="0000" maxlength="4"
                    oninput="onBibInput(this)"
                    onkeydown="onBibKeydown(event)">
            </div>
        </div>

        <!-- NUMPAD -->
        <div>
            <div class="section-title">🔢 Bàn phím số</div>
            <div class="numpad">
                <button class="numpad-btn" onclick="numpad('1')">1</button>
                <button class="numpad-btn" onclick="numpad('2')">2</button>
                <button class="numpad-btn" onclick="numpad('3')">3</button>
                <button class="numpad-btn" onclick="numpad('4')">4</button>
                <button class="numpad-btn" onclick="numpad('5')">5</button>
                <button class="numpad-btn" onclick="numpad('6')">6</button>
                <button class="numpad-btn" onclick="numpad('7')">7</button>
                <button class="numpad-btn" onclick="numpad('8')">8</button>
                <button class="numpad-btn" onclick="numpad('9')">9</button>
                <button class="numpad-btn zero" onclick="numpad('0')">0</button>
                <button class="numpad-btn del" onclick="numpad('del')">⌫</button>
            </div>
            <div style="margin-top:10px;">
                <button class="numpad-btn enter" style="width:100%;padding:16px;" onclick="submitBib()">
                    ✓ XÁC NHẬN CHECK-IN
                </button>
            </div>
        </div>

        <!-- STATUS + RESULT -->
        <div class="status-bar" id="statusBar">
            <div class="status-dot ok" id="statusDot"></div>
            <span id="statusText">Sẵn sàng nhập BIB</span>
        </div>

        <div class="result-card" id="resultCard">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div>
                    <div class="result-bib" id="resBib">—</div>
                    <div class="result-name" id="resName">—</div>
                    <div class="result-club" id="resClub">—</div>
                </div>
                <button class="btn btn-secondary" style="flex:0;padding:8px 14px;font-size:12px;" onclick="clearDisplay()">
                    🖥️ Xoá màn hình
                </button>
            </div>
            <div class="result-meta">
                <div class="result-meta-item">Ảnh: <span id="resPhotos">0</span></div>
                <div class="result-meta-item">Lúc: <span id="resTime">—</span></div>
            </div>
        </div>

    </div>

    <!-- RIGHT: HISTORY -->
    <div class="history-panel">
        <div class="section-title" style="margin-bottom:16px;">📋 Lịch sử check-in hôm nay</div>
        <div id="historyList">
            <div style="color:var(--muted);font-size:13px;text-align:center;padding:32px 0;">
                Chưa có dữ liệu
            </div>
        </div>
    </div>
</main>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ===== CONFIG =====
    // Anh paste GAS URL check-in vào đây hoặc nhập ở ô cấu hình
    const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbw4jCIsCWiE-pcQmVRwleb6XjZlP0ACVQYQeSSMBdv0D-CJ_guEC0vYVUDp300teRU9HA/exec';

    function getGasUrl() {
        return document.getElementById('gasUrl').value.trim() || DEFAULT_GAS_URL;
    }

    // ===== NUMPAD =====
    function numpad(val) {
        const input = document.getElementById('bibInput');
        if (val === 'del') {
            input.value = input.value.slice(0, -1);
        } else if (input.value.length < 4) {
            input.value += val;
        }
        input.focus();
        // Auto submit khi đủ 4 số
        if (input.value.length === 4) {
            setTimeout(submitBib, 300);
        }
    }

    function onBibInput(input) {
        input.value = input.value.replace(/\D/g, '').slice(0, 4);
        if (input.value.length === 4) setTimeout(submitBib, 300);
    }

    function onBibKeydown(e) {
        if (e.key === 'Enter') submitBib();
    }

    // ===== SUBMIT CHECK-IN =====
    async function submitBib() {
        const bib = document.getElementById('bibInput').value.trim();
        if (!bib || bib.length < 1) { showToast('Nhập BIB trước!', true); return; }
        if (!getGasUrl()) { showToast('Chưa nhập GAS URL!', true); return; }

        setStatus('loading', 'Đang xử lý...');
        showLoading(true);

        try {
            const res  = await fetch(`${getGasUrl()}?action=checkin&bib=${encodeURIComponent(bib)}`);
            const data = await res.json();

            if (data.error) throw new Error(data.error);

            // Hiển thị kết quả
            document.getElementById('resBib').textContent   = data.bib;
            document.getElementById('resName').textContent  = data.name;
            document.getElementById('resClub').textContent  = data.club;
            document.getElementById('resPhotos').textContent = `${data.photos?.length || 0} / ${data.total || 0}`;
            document.getElementById('resTime').textContent  = data.time;

            const card = document.getElementById('resultCard');
            card.className = 'result-card show success';

            setStatus('ok', `✅ Check-in thành công — BIB ${data.bib} | ${data.name}`);
            showToast(`✓ ${data.name} — BIB ${data.bib}`);

            // Clear input sau khi xong
            document.getElementById('bibInput').value = '';

            // Refresh history
            loadHistory();

        } catch(e) {
            setStatus('err', '❌ Lỗi: ' + e.message);
            showToast('Lỗi: ' + e.message, true);
            document.getElementById('resultCard').className = 'result-card show error';
        }

        showLoading(false);
    }

    // ===== XOÁ MÀN HÌNH CHIẾU =====
    async function clearDisplay() {
        if (!getGasUrl()) return;
        try {
            await fetch(`${getGasUrl()}?action=clear`);
            showToast('Đã xoá màn hình chiếu');
            document.getElementById('resultCard').className = 'result-card';
        } catch(e) {}
    }

    // ===== HISTORY =====
    async function loadHistory() {
        if (!getGasUrl()) return;
        try {
            const res  = await fetch(`${getGasUrl()}?action=getHistory`);
            const data = await res.json();
            const list = document.getElementById('historyList');

            if (!data.history || data.history.length === 0) {
                list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:32px 0;">Chưa có dữ liệu</div>';
                return;
            }

            list.innerHTML = data.history.map(h => `
                <div class="history-item" onclick="reFill('${h.bib}')">
                    <div class="history-bib">${h.bib}</div>
                    <div class="history-info">
                        <div class="history-name">${h.name || 'Chưa cập nhật'}</div>
                        <div class="history-time">${h.club || ''} · ${h.time || ''}</div>
                    </div>
                    <div class="history-count">${h.total || 0} ảnh</div>
                </div>
            `).join('');
        } catch(e) {}
    }

    function reFill(bib) {
        document.getElementById('bibInput').value = bib;
        document.getElementById('bibInput').focus();
    }

    // ===== UI HELPERS =====
    function setStatus(type, msg) {
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.className  = `status-dot ${type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'loading'}`;
        text.textContent = msg;
    }

    function showLoading(show) {
        document.getElementById('loadingOverlay').className = show ? 'loading-overlay show' : 'loading-overlay';
    }

    function showToast(msg, isError = false) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast show${isError ? ' error' : ''}`;
        setTimeout(() => t.className = 'toast', 3000);
    }

    // ===== INIT =====
    window.onload = () => {
        document.getElementById('bibInput').focus();
        // Test kết nối
        const url = getGasUrl();
        if (url) {
            fetch(`${url}?action=getHistory`)
                .then(() => {
                    document.getElementById('connDot').className = 'status-dot ok';
                    document.getElementById('connText').textContent = 'Kết nối OK';
                    loadHistory();
                })
                .catch(() => {
                    document.getElementById('connDot').className = 'status-dot err';
                    document.getElementById('connText').textContent = 'Mất kết nối';
                });
        } else {
            document.getElementById('connDot').className = 'status-dot err';
            document.getElementById('connText').textContent = 'Chưa cấu hình GAS URL';
        }
    };

    // Lưu GAS URL vào localStorage
    document.getElementById('gasUrl').addEventListener('change', function() {
        localStorage.setItem('checkin_gas_url', this.value);
    });
    const saved = localStorage.getItem('checkin_gas_url');
    if (saved) document.getElementById('gasUrl').value = saved;
</script>
</body>
</html>
