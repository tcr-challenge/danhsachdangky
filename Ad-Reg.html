<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN FIX - TCR 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --admin-primary: #1a237e; --admin-accent: #e67e22; --bg-color: #f4f7f6; --elite-color: #b8860b; --4km-color: #d32f2f; --2km-color: #1a237e; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; }
        .admin-container { max-width: 100%; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 5px solid var(--admin-primary); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .admin-title { color: var(--admin-primary); text-transform: uppercase; font-weight: 800; margin: 0; font-size: 20px; }
        .refresh-status { font-size: 12px; color: #666; background: #f8f9fa; padding: 5px 10px; border-radius: 4px; }
        .search-box { width: 100%; margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; outline: none; font-size: 16px; box-sizing: border-box; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1200px; }
        th { background: var(--admin-primary); color: white; padding: 15px 10px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr.group-divider td { border-bottom: 9px solid #555 !important; }
        .bib-tag { color: white; padding: 4px 10px; border-radius: 4px; font-weight: 800; display: inline-block; min-width: 50px; text-align: center; }
        .btn-action { cursor: pointer; border: none; background: none; font-size: 18px; padding: 5px; }
        .save-btn { color: white; background: #27ae60; border: none; padding: 6px 12px; border-radius: 4px; display: none; font-weight: bold; cursor: pointer; }
        input.edit-mode { width: 95%; padding: 8px; border: 2px solid var(--admin-accent); border-radius: 4px; font-size: 13px; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; color: white; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay"><div>Đang cập nhật dữ liệu...</div></div>

<div class="admin-container">
    <div class="admin-header">
        <h1 class="admin-title">Quản Lý Admin (Đã sửa cột)</h1>
        <div class="refresh-status" id="update-time">Đang tải...</div>
    </div>

    <div class="search-box">
        <input type="text" id="admin-search" placeholder="Tìm tên, BIB, SĐT..." oninput="handleAdminSearch()">
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 70px;">Sửa</th>
                    <th style="width: 50px;">STT</th>
                    <th style="width: 80px;">BIB</th>
                    <th>Họ và Tên</th>
                    <th>Năm sinh</th>
                    <th>Giới tính</th>
                    <th>Số điện thoại</th>
                    <th>Câu lạc bộ</th>
                    <th>Cự ly</th>
                </tr>
            </thead>
            <tbody id="admin-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const tsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0T_icnHRGLNQ019mNGQWpYW561451GJz2zBWkAbEjp87bz8A_H7bf-CAosCsRaMSHD8-Hp5M7Y0Cu/pub?gid=1471720149&single=true&output=tsv';
    const scriptUrl = 'LINK_WEB_APP_CỦA_ANH'; // Dán link Web App vào đây

    let rawData = [];

    async function fetchAdminData() {
        try {
            const response = await fetch(tsvUrl);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split('\t'));
            if (rows.length > 1) {
                rawData = rows;
                renderAdminTable(rows);
            }
        } catch (e) { console.error(e); }
    }

    function renderAdminTable(rows, isSearch = false) {
        let bodyData = rows.slice(1).filter(r => r[1] && r[1].trim() !== ""); 
        
        // Sắp xếp cự ly
        if(!isSearch) {
            bodyData.sort((a, b) => {
                const dA = (a[7]||"").toLowerCase();
                const dB = (b[7]||"").toLowerCase();
                const isEA = dA.includes("elite");
                const isEB = dB.includes("elite");
                if(isEA && !isEB) return -1;
                if(!isEA && isEB) return 1;
                return (a[1] || "").trim().localeCompare((b[1] || "").trim(), 'vi');
            });
        }

        let html = '';
        bodyData.forEach((r, i) => {
            // INDEX CHUẨN THEO ẢNH: A=0(Dấu thời gian), B=1(Tên), C=2(NS), D=3(GT), F=5(SĐT), G=6(CLB), H=7(Cự ly), K=10(BIB)
            let stt = i + 1;
            let bib = (r[10] || "---").trim(); 
            let name = r[1] || "";
            let birth = r[2] || "";
            let sex = r[3] || "";
            let phone = r[5] || "";
            let club = r[6] || "";
            let dist = r[7] || "";
            
            let color = dist.toLowerCase().includes("elite") ? "var(--elite-color)" : (dist.toLowerCase().includes("4") ? "var(--4km-color)" : "var(--2km-color)");

            html += `<tr id="row-${i}">
                <td>
                    <button class="btn-action edit-icon" onclick="enableEdit('${i}')">✏️</button>
                    <button class="save-btn" id="save-${i}" onclick="saveEdit('${i}')">LƯU</button>
                </td>
                <td>${stt}</td>
                <td class="data-bib"><span class="bib-tag" style="background:${color}">${bib}</span></td>
                <td class="data-name" style="font-weight:600">${name}</td>
                <td class="data-birth">${birth}</td>
                <td class="data-sex">${sex}</td>
                <td class="data-phone">${phone}</td>
                <td class="data-club">${club}</td>
                <td class="data-dist" style="color:${color}; font-weight:bold">${dist}</td>
            </tr>`;
        });

        document.getElementById('admin-table-body').innerHTML = html;
        document.getElementById('update-time').innerText = "Cập nhật: " + new Date().toLocaleTimeString();
    }

    function enableEdit(id) {
        const row = document.getElementById(`row-${id}`);
        const fields = ['bib', 'name', 'birth', 'sex', 'phone', 'club', 'dist'];
        fields.forEach(f => {
            const cell = row.querySelector(`.data-${f}`);
            let val = cell.innerText;
            if(f === 'bib' && cell.querySelector('.bib-tag')) val = cell.querySelector('.bib-tag').innerText;
            cell.innerHTML = `<input type="text" class="edit-mode" value="${val}">`;
        });
        row.querySelector('.edit-icon').style.display = 'none';
        row.querySelector('.save-btn').style.display = 'inline-block';
    }

    async function saveEdit(id) {
        const row = document.getElementById(`row-${id}`);
        // Gửi data về Sheets dựa trên Tên và SĐT (hoặc thêm cột ID riêng nếu cần)
        alert("Tính năng lưu đang chờ link Web App chính xác của anh.");
    }

    function handleAdminSearch() {
        const val = document.getElementById('admin-search').value.toLowerCase();
        const filtered = [rawData[0], ...rawData.slice(1).filter(r => r.join(' ').toLowerCase().includes(val))];
        renderAdminTable(filtered, true);
    }

    fetchAdminData();
</script>
</body>
</html>
