<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runner Photos - TCR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #ef4444; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Lightbox */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 85vh; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-red-600 uppercase">Hệ Thống Tìm Ảnh TCR</h1>
            <p id="stats" class="text-sm font-bold text-gray-500 mt-2">Đang thống kê số lượng ảnh...</p>
        </div>

        <!-- Tìm kiếm -->
        <div class="bg-white p-4 rounded-2xl shadow-lg flex flex-col md:flex-row gap-3 mb-8">
            <input type="text" id="searchInput" placeholder="Nhập BIB, Tên hoặc CLB..." class="flex-1 p-4 border-2 rounded-xl outline-none focus:border-red-500 text-lg">
            <button onclick="startSearch()" class="bg-red-600 text-white px-8 py-4 rounded-xl font-bold hover:bg-red-700 transition-all">TÌM ẢNH</button>
        </div>

        <div id="loading" class="hidden text-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mx-auto mb-4"></div>
            <p class="text-gray-600">Đang đồng bộ dữ liệu Drive...</p>
        </div>

        <div id="photoGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>

        <!-- Phân trang -->
        <div id="pagination" class="mt-8 flex justify-center items-center gap-4 hidden">
            <button onclick="changePage(-1)" id="btnPrev" class="p-3 bg-white rounded-full shadow disabled:opacity-30">←</button>
            <span class="font-bold bg-white px-4 py-2 rounded-lg"><span id="currPage">1</span> / <span id="totalPage">1</span></span>
            <button onclick="changePage(1)" id="btnNext" class="p-3 bg-white rounded-full shadow disabled:opacity-30">→</button>
        </div>
    </div>

    <!-- Lightbox để xem ảnh gốc -->
    <div id="lightbox" onclick="this.style.display='none'">
        <div class="relative flex flex-col items-center">
            <img id="fullImg" src="" alt="Full Quality">
            <a id="downloadBtn" href="" download class="mt-4 bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-red-500 hover:text-white transition-all">TẢI ẢNH GỐC</a>
            <p class="text-white text-xs mt-2 italic">Chạm bất kỳ đâu để đóng</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqxpd5d4rfOhkVOn54FKvyBvTQXgZztVOZIVhc8iJeyWYnsQBcFCUOfwzu1KnGkFSn/exec"; // Dán link /exec của anh vào đây
        const PAGE_SIZE = 15;
        let allData = [];
        let currentPage = 1;

        window.onload = () => startSearch("");

        async function startSearch() {
            const query = document.getElementById('searchInput').value;
            const loading = document.getElementById('loading');
            const grid = document.getElementById('photoGrid');
            const stats = document.getElementById('stats');

            loading.classList.remove('hidden');
            grid.innerHTML = "";

            try {
                const res = await fetch(`${SCRIPT_URL}?query=${encodeURIComponent(query)}`);
                const result = await res.json();
                allData = result.photos;
                
                stats.innerText = `HỆ THỐNG ĐANG CÓ: ${result.total} ẢNH`;
                currentPage = 1;
                render();
            } catch (e) {
                alert("Lỗi kết nối Drive!");
            } finally {
                loading.classList.add('hidden');
            }
        }

        function render() {
            const grid = document.getElementById('photoGrid');
            const start = (currentPage - 1) * PAGE_SIZE;
            const currentItems = allData.slice(start, start + PAGE_SIZE);

            grid.innerHTML = currentItems.map(p => {
                const thumb = `https://lh3.googleusercontent.com/d/${p.id}=s400`; // Thumbnail nhẹ
                const full = `https://lh3.googleusercontent.com/d/${p.id}=s0`;    // Ảnh gốc
                return `
                <div class="bg-white p-2 rounded-lg shadow hover:shadow-xl transition-all cursor-pointer" onclick="openLightbox('${full}')">
                    <img src="${thumb}" class="w-full h-48 object-cover rounded-md" loading="lazy">
                    <p class="text-[10px] text-gray-400 mt-1 truncate text-center">${p.name}</p>
                </div>`;
            }).join('');

            updateUI();
        }

        function openLightbox(url) {
            document.getElementById('fullImg').src = url;
            document.getElementById('downloadBtn').href = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function updateUI() {
            const total = Math.ceil(allData.length / PAGE_SIZE);
            document.getElementById('pagination').classList.toggle('hidden', total <= 1);
            document.getElementById('currPage').innerText = currentPage;
            document.getElementById('totalPage').innerText = total;
            document.getElementById('btnPrev').disabled = (currentPage === 1);
            document.getElementById('btnNext').disabled = (currentPage === total);
        }

        function changePage(step) {
            currentPage += step;
            render();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
