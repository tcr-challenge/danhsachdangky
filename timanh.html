<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tìm ảnh giải chạy</title>

<style>
body { font-family: Arial; margin: 0; background: #f5f5f5; }
header { background: #111; color: white; padding: 15px; text-align: center; }

.search-box {
  padding: 15px;
  text-align: center;
  background: white;
  position: sticky;
  top: 0;
}

input {
  width: 90%;
  max-width: 400px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.container { padding: 15px; }

.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.grid {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
  margin-top: 10px;
}

.grid img {
  width: 100%;
  border-radius: 6px;
}

/* Modal */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.modal img {
  max-width:90%;
  max-height:80%;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  color:white;
  font-size:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<header><h3>📸 Tìm ảnh giải chạy</h3></header>

<div class="search-box">
  <input type="text" id="search" placeholder="Nhập BIB, tên hoặc CLB...">
</div>

<div class="container" id="result"></div>

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">✖</span>
  <img id="modalImg">
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxv202kLU4ZPyYZEdwhLcmuCtEkWlnUsrVXnVCVPaT9jWxxkrH7ojrC2kN4nse8tdpUBg/exec";

let data = [];
let cacheKey = "runner_photo_data_v1";

// 🔥 Load cache trước
const cache = localStorage.getItem(cacheKey);
if (cache) {
  data = JSON.parse(cache);
}

// 🔥 Fetch API (cập nhật ngầm)
fetch(API)
.then(res => res.json())
.then(json => {
  data = json;
  localStorage.setItem(cacheKey, JSON.stringify(json));
});

// 🔥 Debounce search
let timeout;
document.getElementById("search").addEventListener("input", function() {
  clearTimeout(timeout);
  const value = this.value;

  timeout = setTimeout(() => {
    search(value);
  }, 300);
});

function search(keyword) {
  keyword = keyword.toLowerCase();

  if (!keyword) {
    document.getElementById("result").innerHTML = "";
    return;
  }

  const filtered = data.filter(item =>
    item.bib.toString().includes(keyword) ||
    item.ten.toLowerCase().includes(keyword) ||
    item.clb.toLowerCase().includes(keyword)
  ).slice(0, 50); // 🔥 giới hạn 50 kết quả

  render(filtered);
}

function render(list) {
  const container = document.getElementById("result");
  container.innerHTML = "";

  list.forEach((item, index) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>BIB ${item.bib}</b> - ${item.ten}<br>
      <small>${item.clb} • ${item.images.length} ảnh</small>
      <div class="grid" id="grid_${index}"></div>
    `;

    div.onclick = () => toggleImages(item, index);

    container.appendChild(div);
  });
}

// 🔥 chỉ load ảnh khi click
function toggleImages(item, index) {
  const grid = document.getElementById("grid_" + index);

  if (grid.style.display === "grid") {
    grid.style.display = "none";
    grid.innerHTML = "";
    return;
  }

  grid.style.display = "grid";

  grid.innerHTML = item.images.slice(0, 100).map(img => `
    <img src="${img}" onclick="openModal('${img}')">
  `).join("");
}

// Modal
function openModal(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
