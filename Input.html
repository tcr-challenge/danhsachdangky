<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #eceff1; }
    .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
    input { width: 80%; padding: 15px; font-size: 24px; border: 2px solid #007bff; border-radius: 8px; outline: none; }
    #msg { margin-top: 15px; font-weight: bold; min-height: 20px; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
  </style>
</head>
<body>
  <div class="card">
    <h3>TRANG NHẬP BIB</h3>
    <input type="number" id="bib" placeholder="Số BIB..." autofocus onkeypress="if(event.keyCode==13) send()">
    <div id="msg"></div>
  </div>
  <script>
    function send() {
      var bib = document.getElementById('bib').value;
      if(!bib) return;
      document.getElementById('msg').className = '';
      document.getElementById('msg').innerText = 'Đang gửi...';
      
      google.script.run.withSuccessHandler(function(res) {
        document.getElementById('msg').innerText = res;
        document.getElementById('msg').className = res.includes('OK') ? 'success' : 'error';
        document.getElementById('bib').value = '';
        document.getElementById('bib').focus();
      }).processBib(bib);
    }
  </script>
</body>
</html>
