<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #2c3e50; }
    .box { background: white; padding: 40px; border-radius: 10px; shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
    input { width: 200px; padding: 15px; font-size: 24px; border: 2px solid #ddd; border-radius: 5px; margin-bottom: 20px; text-align: center; }
    button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; }
    #status { margin-top: 20px; font-weight: bold; color: #2c3e50; }
  </style>
</head>
<body>
  <div class="box">
    <h2>NHẬP SỐ BIB</h2>
    <input type="text" id="bibInput" placeholder="Ví dụ: 123" autofocus> <br>
    <button onclick="submit()">HIỂN THỊ LÊN MÀN CHIẾU</button>
    <div id="status"></div>
  </div>

  <script>
    function submit() {
      var bib = document.getElementById('bibInput').value;
      if(!bib) return;
      document.getElementById('status').innerText = "Đang xử lý...";
      google.script.run.withSuccessHandler(function(res) {
        document.getElementById('status').innerText = res;
        document.getElementById('bibInput').value = '';
        document.getElementById('bibInput').focus();
      }).processBib(bib);
    }
    // Nhấn Enter để gửi
    document.getElementById("bibInput").addEventListener("keyup", function(event) {
      if (event.keyCode === 13) { submit(); }
    });
  </script>
</body>
</html>
