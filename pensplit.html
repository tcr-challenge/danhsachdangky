<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Đăng Ký - Giải Chạy Đình Làng Thượng Cát 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #d32f2f; 
            --primary-hover: #b71c1c;
            --secondary-color: #1a237e; 
            --bg-color: #f4f7f6;
            --text-color: #333;
            --elite-color: #b8860b;
            --bg-elite: #fff9e6;
            --bg-4km: #fdf2f2;
            --bg-2km: #f0f2ff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .cover-photo {
            width: 100%;
            max-width: 1200px;
            height: auto;
            min-height: 200px;
            background: #ddd;
            display: block;
            border-bottom: 5px solid var(--primary-color);
            object-fit: cover;
        }

        .tabs-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            background: #eee;
            gap: 5px;
            padding: 10px 10px 0 10px;
            box-sizing: border-box;
        }

        .tab-link {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: #555;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            border-radius: 12px 12px 0 0;
            background: #e0e0e0;
            border: none;
            position: relative;
        }

        .tab-link.active {
            color: #fff;
            background: var(--primary-color);
            box-shadow: 0 -4px 12px rgba(211, 47, 47, 0.2);
            transform: translateY(-2px);
            z-index: 2;
        }

        .tab-content {
            display: none;
            width: 100%;
            max-width: 1200px;
            background: #fff;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 26px; color: var(--secondary-color); text-transform: uppercase; font-weight: 800; }
        .header .sub-title { margin-top: 15px; font-size: 16px; color: #555; font-weight: 500; }
        
        .search-container {
            background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 25px;
            display: flex; gap: 10px; justify-content: center; align-items: center; border: 1px solid #eee;
        }

        .search-input { padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; width: 300px; font-size: 16px; outline: none; }
        .search-btn { background: var(--secondary-color); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .export-btn { background: #2e7d32; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 700; margin-left: 10px; }

        .summary-box {
            display: flex; justify-content: center; gap: 25px; margin-bottom: 10px; padding: 15px;
            background: #f9f9f9; border-radius: 8px; font-weight: 700; font-size: 24px; 
        }

        .group-header {
            padding: 18px; font-weight: 800; text-align: center; margin: 25px 0 0 0;
            text-transform: uppercase; border-radius: 12px 12px 0 0; font-size: 24px; width: 100%;
        }

        .header-elite { background-color: #ffd700; color: #000; }
        .header-4km { background-color: #ff5252; color: #fff; }
        .header-2km { background-color: #3949ab; color: #fff; }

        table { width: 100%; border-collapse: collapse; min-width: 900px; border: 1px solid #ddd; table-layout: fixed; }
        th, td { padding: 14px 5px; border-bottom: 1px solid #ddd; border-right: 1px solid #eee; font-size: 15px; text-align: center; word-wrap: break-word; }
        th { background-color: #444; color: white; }

        /* Tránh kẹt vận động viên giữa 2 trang */
        tr { page-break-inside: avoid !important; }
        .row-bold td { font-weight: 800 !important; background-color: #f0f0f0; }

        /* Vùng xuất PDF ẩn trên web */
        #pdf-export-content { display: none; }
    </style>
</head>
<body>

<img src="images/banner.jpg" alt="Banner" class="cover-photo">

<div class="tabs-container">
    <div class="tab-link active" onclick="openTab(event, 'tab-runners')">Danh sách VĐV</div>
    <div class="tab-link" onclick="openTab(event, 'tab-rules')">Thể lệ giải</div>
    <div class="tab-link" onclick="openTab(event, 'tab-map')">Sơ đồ đường chạy</div>
    <div class="tab-link" onclick="openTab(event, 'tab-guide')">Hướng dẫn VĐV</div>
</div>

<div id="tab-runners" class="tab-content active">
    <div class="header">
        <h1>DANH SÁCH ĐĂNG KÝ GIẢI CHẠY<br>CHÀO MỪNG LỄ HỘI TRUYỀN THỐNG ĐÌNH LÀNG THƯỢNG CÁT 2026</h1>
        <div class="sub-title">Powered by THUONG CAT RUNNERS - TCR</div>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Tìm tên, BIB, SĐT...">
        <button class="search-btn" onclick="handleSearch()">Tìm kiếm</button>
        <button class="export-btn" onclick="generatePrintPDF()">Xuất file PDF (Mỗi nhóm 1 trang)</button>
    </div>

    <div id="summary" class="summary-box"></div>
    <div id="tables-container">Đang tải dữ liệu...</div>
</div>

<div id="pdf-export-content"></div>

<script>
    let allRunnersData = [];
    const tsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0T_icnHRGLNQ019mNGQWpYW561451GJz2zBWkAbEjp87bz8A_H7bf-CAosCsRaMSHD8-Hp5M7Y0Cu/pub?gid=1471720149&single=true&output=tsv';

    async function fetchData() {
        try {
            const response = await fetch(tsvUrl);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split('\t'));
            if (rows.length > 1) { allRunnersData = rows; renderTable(rows); }
        } catch (e) { console.error(e); }
    }

    function sortRunners(runners, idxs) {
        return runners.sort((a, b) => {
            let clubA = (a[idxs.idxClub] || 'Cá nhân').trim().toLowerCase();
            let clubB = (b[idxs.idxClub] || 'Cá nhân').trim().toLowerCase();
            if (clubA < clubB) return -1;
            if (clubA > clubB) return 1;
            let yearA = parseInt((a[idxs.idxBirth] || '').match(/\d{4}/)?.[0] || 0);
            let yearB = parseInt((b[idxs.idxBirth] || '').match(/\d{4}/)?.[0] || 0);
            return yearB - yearA; 
        });
    }

    function createTableHtml(title, runners, type, idxs, isPdf = false) {
        if (runners.length === 0) return "";
        let headerClass = type === 1 ? "header-elite" : (type === 2 ? "header-4km" : "header-2km");
        let sortedRunners = sortRunners([...runners], idxs);

        // Lệnh ngắt trang cho PDF: Nhóm mới luôn nằm ở trang mới
        let breakStyle = isPdf ? 'style="page-break-before: always; padding-top: 20px;"' : '';
        
        let html = `<div ${breakStyle}>`;
        if(isPdf) {
            html += `<div style="text-align:center; margin-bottom:15px; font-family:'Inter', sans-serif;">
                        <h2 style="text-transform:uppercase; color:#1a237e; margin-bottom:5px;">DANH SÁCH VẬN ĐỘNG VIÊN</h2>
                        <h1 style="text-transform:uppercase; color:#d32f2f; margin:0;">CỰ LY: ${title.toUpperCase()}</h1>
                        <p style="font-size:14px; color:#555;">Di sản Thượng Cát 2026</p>
                     </div>`;
        }
        
        html += `<div class="group-header ${headerClass}">${title} (${runners.length} VĐV)</div>`;
        html += `<table>
                    <thead><tr>
                        <th style="width:40px;">STT</th><th style="width:70px;">BIB</th>
                        <th style="width:250px; text-align:left; padding-left:15px;">Họ và Tên</th>
                        <th style="width:80px;">Năm sinh</th><th style="width:80px;">Giới</th>
                        <th style="width:120px;">SĐT</th><th style="text-align:left; padding-left:10px;">CLB/Địa phương</th>
                    </tr></thead><tbody>`;

        let currentClub = "";
        let isBoldGroup = false;

        sortedRunners.forEach((row, i) => {
            let name = (row[idxs.idxName] || '').trim().replace(/^"|"$/g, '');
            let clubRaw = (row[idxs.idxClub] || '').trim().replace(/^"|"$/g, '') || 'Cá nhân';
            let bibRaw = (row[idxs.idxBib] || '---').trim();
            let phoneVal = (row[idxs.idxPhone] || '').replace(/[^0-9]/g, '');
            
            if (clubRaw.toLowerCase() !== currentClub.toLowerCase()) {
                currentClub = clubRaw;
                isBoldGroup = !isBoldGroup;
            }

            let phoneDisplay = isPdf ? phoneVal : (phoneVal.length >= 4 ? `xxx.xxx.${phoneVal.slice(-4)}` : '---');
            let rowClass = isBoldGroup ? 'class="row-bold"' : '';

            html += `<tr ${rowClass}>
                <td>${i + 1}</td><td style="font-weight:bold;">${bibRaw}</td>
                <td style="text-align:left; padding-left:15px;">${name}</td>
                <td>${(row[idxs.idxBirth]||'').match(/\d{4}/)?.[0] || '---'}</td>
                <td>${row[idxs.idxGender]||'---'}</td><td>${phoneDisplay}</td>
                <td style="text-align:left; padding-left:10px;">${clubRaw}</td>
            </tr>`;
        });
        return html + `</tbody></table></div>`;
    }

    async function generatePrintPDF() {
        const header = allRunnersData[0].map(h => h.toLowerCase().trim());
        const bodyData = allRunnersData.slice(1).filter(r => r[header.findIndex(h => h.includes('tên'))]);
        const getIdx = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));
        const idxs = {
            idxName: getIdx(['tên']), idxGender: getIdx(['giới']), idxBirth: getIdx(['sinh']),
            idxPhone: getIdx(['thoại', 'phone']), idxClub: getIdx(['club', 'địa phương', 'đơn vị']), 
            idxDistance: getIdx(['cự ly']), idxBib: getIdx(['bib'])
        };

        const currentYear = new Date().getFullYear();
        const elite = bodyData.filter(r => (r[idxs.idxDistance]||"").toLowerCase().includes("elite"));
        const km4 = bodyData.filter(r => !(r[idxs.idxDistance]||"").toLowerCase().includes("elite") && (r[idxs.idxDistance]||"").includes("4"));
        const km2Child = bodyData.filter(r => {
            const year = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            return (r[idxs.idxDistance]||"").includes("2") && year && (currentYear - year < 12);
        });
        const km2Adult = bodyData.filter(r => {
            const year = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            const age = currentYear - year;
            return (r[idxs.idxDistance]||"").includes("2") && year && (age >= 12 && age <= 55);
        });

        const pdfBox = document.getElementById('pdf-export-content');
        pdfBox.style.display = 'block';
        // Xây dựng nội dung PDF với logic ngắt trang
        pdfBox.innerHTML = 
            createTableHtml("Nhóm Elite", elite, 1, idxs, true) + 
            createTableHtml("Nhóm 4KM", km4, 2, idxs, true) + 
            createTableHtml("Nhóm 2KM (Dưới 12 tuổi)", km2Child, 3, idxs, true) +
            createTableHtml("Nhóm 2KM (Từ 12-55 tuổi)", km2Adult, 3, idxs, true);

        const opt = {
            margin: [10, 5, 10, 5],
            filename: 'Danh_Sach_In_TCR_2026.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
            pagebreak: { mode: ['css', 'legacy'] } // Sử dụng CSS để kiểm soát ngắt trang
        };

        await html2pdf().set(opt).from(pdfBox).save();
        pdfBox.style.display = 'none';
        pdfBox.innerHTML = '';
    }

    function renderTable(rows) {
        if (!rows || rows.length === 0) return;
        const header = rows[0].map(h => h.toLowerCase().trim());
        const bodyData = rows.slice(1).filter(r => r[header.findIndex(h => h.includes('tên'))]);
        const getIdx = (keywords) => header.findIndex(h => keywords.some(k => h.includes(k)));
        const idxs = {
            idxName: getIdx(['tên']), idxGender: getIdx(['giới']), idxBirth: getIdx(['sinh']),
            idxPhone: getIdx(['thoại', 'phone']), idxClub: getIdx(['club', 'địa phương', 'đơn vị']), 
            idxDistance: getIdx(['cự ly']), idxBib: getIdx(['bib'])
        };

        const currentYear = new Date().getFullYear();
        const elite = bodyData.filter(r => (r[idxs.idxDistance]||"").toLowerCase().includes("elite"));
        const km4 = bodyData.filter(r => !(r[idxs.idxDistance]||"").toLowerCase().includes("elite") && (r[idxs.idxDistance]||"").includes("4"));
        const km2Child = bodyData.filter(r => {
            const year = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            return (r[idxs.idxDistance]||"").includes("2") && year && (currentYear - year < 12);
        });
        const km2Adult = bodyData.filter(r => {
            const year = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            const age = currentYear - year;
            return (r[idxs.idxDistance]||"").includes("2") && year && (age >= 12 && age <= 55);
        });

        document.getElementById('tables-container').innerHTML = 
            createTableHtml("Nhóm Elite", elite, 1, idxs) + 
            createTableHtml("Nhóm 4KM", km4, 2, idxs) + 
            createTableHtml("Nhóm 2KM - Dưới 12 tuổi", km2Child, 3, idxs) +
            createTableHtml("Nhóm 2KM - Từ 12-55 tuổi", km2Adult, 3, idxs);

        document.getElementById('summary').innerHTML = `<span>Elite: ${elite.length}</span> | <span>4KM: ${km4.length}</span> | <span>2KM: ${km2Child.length + km2Adult.length}</span>`;
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
