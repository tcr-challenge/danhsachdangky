<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Đăng Ký - Giải Chạy Đình Làng Thượng Cát 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #d32f2f; 
            --primary-hover: #b71c1c;
            --secondary-color: #1a237e; 
            --bg-color: #f4f7f6;
            --text-color: #333;
            --elite-color: #b8860b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .cover-photo { width: 100%; max-width: 1200px; height: auto; border-bottom: 5px solid var(--primary-color); }

        .tabs-container {
            width: 100%; max-width: 1200px; display: flex; background: #eee; gap: 5px; padding: 10px 10px 0 10px; box-sizing: border-box;
        }

        .tab-link {
            flex: 1; padding: 15px 10px; text-align: center; cursor: pointer; font-weight: 700;
            text-transform: uppercase; border-radius: 12px 12px 0 0; background: #e0e0e0; border: none;
        }

        .tab-link.active { color: #fff; background: var(--primary-color); }

        .tab-content {
            display: none; width: 100%; max-width: 1200px; background: #fff; padding: 30px; box-sizing: border-box;
            border-radius: 0 0 12px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 30px;
        }

        .tab-content.active { display: block; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 26px; color: var(--secondary-color); text-transform: uppercase; font-weight: 800; }

        .search-container {
            background: #f9f9f9; padding: 20px; border-radius: 12px; margin-bottom: 25px;
            display: flex; gap: 10px; justify-content: center; align-items: center; border: 1px solid #eee;
        }

        .search-input { padding: 12px 15px; border: 2px solid #ddd; border-radius: 8px; width: 300px; font-size: 16px; }

        .btn { padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 700; border: none; color: white; }
        .search-btn { background: var(--secondary-color); }
        .pdf-btn { background: #c62828; } /* Màu đỏ cho nút PDF */

        .summary-box {
            display: flex; justify-content: center; gap: 20px; padding: 15px; background: #f9f9f9;
            border-radius: 8px; font-weight: 700; font-size: 20px; margin-bottom: 15px;
        }

        .group-header {
            padding: 15px; font-weight: 800; text-align: center; text-transform: uppercase;
            border-radius: 12px 12px 0 0; font-size: 20px; margin-top: 25px;
        }
        .header-elite { background: #ffd700; color: #000; }
        .header-4km { background: #ff5252; color: #fff; }
        .header-2km { background: #3949ab; color: #fff; }

        table { width: 100%; border-collapse: collapse; border: 1px solid #ddd; table-layout: fixed; }
        th, td { padding: 12px 5px; border: 1px solid #ddd; text-align: center; font-size: 14px; word-wrap: break-word; }
        th { background: #444; color: white; }

        /* Style phân biệt CLB */
        .row-bold td { font-weight: 800 !important; background-color: #f2f2f2; }

        /* Style đặc biệt khi in PDF */
        .pdf-page-break { page-break-before: always; }
        .no-split { page-break-inside: avoid !important; }

    </style>
</head>
<body>

<img src="images/banner.jpg" alt="Banner" class="cover-photo">

<div class="tabs-container">
    <div class="tab-link active" onclick="openTab(event, 'tab-runners')">Danh sách VĐV</div>
</div>

<div id="tab-runners" class="tab-content active">
    <div class="header">
        <h1>DANH SÁCH ĐĂNG KÝ GIẢI CHẠY ĐÌNH LÀNG THƯỢNG CÁT 2026</h1>
    </div>

    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="Tìm tên, BIB, SĐT...">
        <button class="btn search-btn" onclick="handleSearch()">Tìm kiếm</button>
        <button class="btn pdf-btn" onclick="exportFullPDF()">Xuất PDF để In</button>
    </div>

    <div id="summary" class="summary-box"></div>
    <div id="tables-container">Đang tải dữ liệu...</div>
</div>

<div id="pdf-content" style="display: none;"></div>

<script>
    let allRunnersData = [];
    const tsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0T_icnHRGLNQ019mNGQWpYW561451GJz2zBWkAbEjp87bz8A_H7bf-CAosCsRaMSHD8-Hp5M7Y0Cu/pub?gid=1471720149&single=true&output=tsv';

    async function fetchData() {
        try {
            const response = await fetch(tsvUrl);
            const text = await response.text();
            const rows = text.split('\n').map(row => row.split('\t'));
            if (rows.length > 1) { allRunnersData = rows; renderTable(rows); }
        } catch (e) { console.error(e); }
    }

    function sortRunners(runners, idxs) {
        return runners.sort((a, b) => {
            let clubA = (a[idxs.idxClub] || 'Cá nhân').trim().toLowerCase();
            let clubB = (b[idxs.idxClub] || 'Cá nhân').trim().toLowerCase();
            if (clubA < clubB) return -1;
            if (clubA > clubB) return 1;
            let yearA = parseInt((a[idxs.idxBirth] || '').match(/\d{4}/)?.[0] || 0);
            let yearB = parseInt((b[idxs.idxBirth] || '').match(/\d{4}/)?.[0] || 0);
            return yearB - yearA; 
        });
    }

    function createTableHtml(title, runners, type, idxs, isPdf = false) {
        if (runners.length === 0) return "";
        let headerClass = type === 1 ? "header-elite" : (type === 2 ? "header-4km" : "header-2km");
        let sorted = sortRunners([...runners], idxs);

        // Mỗi nhóm bắt đầu một trang mới trong PDF
        let html = `<div class="${isPdf ? 'pdf-page-break' : ''}">`;
        
        if(isPdf) {
            html += `<div style="text-align:center; margin-bottom:20px;">
                        <h2 style="color:#1a237e; margin:0;">DANH SÁCH VẬN ĐỘNG VIÊN - CỰ LY: ${title.toUpperCase()}</h2>
                        <hr style="border:1px solid #d32f2f; width:100px;">
                     </div>`;
        }

        html += `<div class="group-header ${headerClass}">${title} (${runners.length} VĐV)</div>`;
        html += `<table><thead><tr>
                    <th style="width:40px;">STT</th><th style="width:70px;">BIB</th>
                    <th style="width:200px; text-align:left; padding-left:10px;">Họ và Tên</th>
                    <th style="width:100px;">Năm sinh</th><th style="width:100px;">Giới tính</th>
                    <th style="width:150px;">Điện thoại</th><th style="text-align:left; padding-left:10px;">CLB/Địa phương</th>
                </tr></thead><tbody>`;

        let currentClub = "";
        let isBold = false;

        sorted.forEach((row, i) => {
            let club = (row[idxs.idxClub] || 'Cá nhân').trim();
            if (club.toLowerCase() !== currentClub.toLowerCase()) { currentClub = club; isBold = !isBold; }
            
            let phone = (row[idxs.idxPhone] || '').replace(/[^0-9]/g, '');
            let phoneDisplay = isPdf ? phone : (phone.length > 4 ? `xxx.xxx.${phone.slice(-4)}` : '---');

            // no-split giúp hàng không bị cắt ngang trang
            html += `<tr class="${isBold ? 'row-bold' : ''} no-split">
                <td>${i + 1}</td><td><b>${(row[idxs.idxBib] || '---')}</b></td>
                <td style="text-align:left; padding-left:10px;">${(row[idxs.idxName] || '').replace(/"/g, '')}</td>
                <td>${(row[idxs.idxBirth]||'').match(/\d{4}/)?.[0] || '---'}</td>
                <td>${row[idxs.idxGender]||'---'}</td><td>${phoneDisplay}</td>
                <td style="text-align:left; padding-left:10px;">${club}</td>
            </tr>`;
        });
        return html + `</tbody></table></div>`;
    }

    function getIndices(header) {
        const h = header.map(v => v.toLowerCase());
        const find = (keys) => h.findIndex(v => keys.some(k => v.includes(k)));
        return {
            idxName: find(['tên']), idxBirth: find(['sinh']), idxGender: find(['giới']),
            idxPhone: find(['thoại', 'phone']), idxClub: find(['club', 'địa phương', 'đơn vị']),
            idxDistance: find(['cự ly']), idxBib: find(['bib'])
        };
    }

    function renderTable(rows) {
        const idxs = getIndices(rows[0]);
        const body = rows.slice(1).filter(r => r[idxs.idxName]);
        const currentYear = new Date().getFullYear();

        const elite = body.filter(r => (r[idxs.idxDistance]||"").toLowerCase().includes("elite"));
        const km4 = body.filter(r => !(r[idxs.idxDistance]||"").toLowerCase().includes("elite") && (r[idxs.idxDistance]||"").includes("4"));
        const km2Child = body.filter(r => {
            let y = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            return (r[idxs.idxDistance]||"").includes("2") && y && (currentYear - y < 12);
        });
        const km2Adult = body.filter(r => {
            let y = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            let age = currentYear - y;
            return (r[idxs.idxDistance]||"").includes("2") && y && (age >= 12 && age <= 55);
        });

        document.getElementById('tables-container').innerHTML = 
            createTableHtml("Nhóm Elite", elite, 1, idxs) + 
            createTableHtml("Nhóm 4KM", km4, 2, idxs) + 
            createTableHtml("Nhóm 2KM (<12 tuổi)", km2Child, 3, idxs) +
            createTableHtml("Nhóm 2KM (12-55 tuổi)", km2Adult, 3, idxs);

        document.getElementById('summary').innerHTML = `Tổng: ${body.length} VĐV | Elite: ${elite.length} | 4KM: ${km4.length} | 2KM: ${km2Child.length + km2Adult.length}`;
    }

    // Chức năng xuất PDF quan trọng
    async function exportFullPDF() {
        const container = document.getElementById('tables-container');
        const idxs = getIndices(allRunnersData[0]);
        const body = allRunnersData.slice(1).filter(r => r[idxs.idxName]);
        const currentYear = new Date().getFullYear();

        const elite = body.filter(r => (r[idxs.idxDistance]||"").toLowerCase().includes("elite"));
        const km4 = body.filter(r => !(r[idxs.idxDistance]||"").toLowerCase().includes("elite") && (r[idxs.idxDistance]||"").includes("4"));
        const km2Child = body.filter(r => {
            let y = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            return (r[idxs.idxDistance]||"").includes("2") && y && (currentYear - y < 12);
        });
        const km2Adult = body.filter(r => {
            let y = parseInt((r[idxs.idxBirth]||"").match(/\d{4}/)?.[0]);
            let age = currentYear - y;
            return (r[idxs.idxDistance]||"").includes("2") && y && (age >= 12 && age <= 55);
        });

        // Tạo nội dung riêng để xuất PDF (với định dạng trang riêng)
        const pdfBox = document.getElementById('pdf-content');
        pdfBox.style.display = "block";
        pdfBox.innerHTML = `<h1 style="text-align:center; text-transform:uppercase;">Danh sách VĐV Thượng Cát 2026</h1>` +
            createTableHtml("Elite", elite, 1, idxs, true) + 
            createTableHtml("4KM", km4, 2, idxs, true) + 
            createTableHtml("2KM (<12)", km2Child, 3, idxs, true) +
            createTableHtml("2KM (12-55)", km2Adult, 3, idxs, true);

        const opt = {
            margin: [10, 5, 10, 5],
            filename: 'Danh_Sach_In_An_TCR_2026.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
            pagebreak: { mode: ['avoid-all', 'css'] } // Kết hợp CSS để ngắt trang chuẩn
        };

        await html2pdf().set(opt).from(pdfBox).save();
        pdfBox.style.display = "none";
    }

    function openTab(evt, tabName) { fetchData(); }

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
