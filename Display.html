<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: #fff; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
    #container { display: none; width: 100%; }
    .photo { width: 400px; height: 400px; border-radius: 20px; object-fit: cover; border: 10px solid #f39c12; }
    .bib { font-size: 150px; font-weight: 900; color: #e67e22; margin: 0; }
    .name { font-size: 80px; font-weight: bold; text-transform: uppercase; margin: 10px 0; color: #2c3e50; }
    .club { font-size: 40px; color: #7f8c8d; }
    #waiting { font-size: 30px; color: #bdc3c7; }
  </style>
</head>
<body>
  <div id="waiting">Sẵn sàng chờ vận động viên...</div>
  
  <div id="container">
    <img id="u_photo" src="" class="photo">
    <div class="bib" id="u_bib"></div>
    <div class="name" id="u_name"></div>
    <div class="club" id="u_club"></div>
  </div>

  <script>
    var lastTimestamp = 0;
    
    function checkUpdate() {
      google.script.run.withSuccessHandler(function(data) {
        if (data && data.timestamp > lastTimestamp) {
          lastTimestamp = data.timestamp;
          document.getElementById('waiting').style.display = 'none';
          document.getElementById('container').style.display = 'block';
          
          document.getElementById('u_bib').innerText = "BIB " + data.bib;
          document.getElementById('u_name').innerText = data.name;
          document.getElementById('u_club').innerText = data.club;
          document.getElementById('u_photo').src = data.photo;
        }
      }).getLatestData();
    }
    
    // Kiểm tra liên tục mỗi 1 giây để cập nhật tức thì
    setInterval(checkUpdate, 1000);
  </script>
</body>
</html>
